framework:
    messenger:
        failure_transport: failed

        buses:
            command.bus:
                middleware:
                    - validation
            query.bus:
                middleware:
                    - validation

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: messages
                        type: direct
                    queues:
                        messages: ~
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            'App\Message\AsyncExampleMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
                failed: 'in-memory://'
