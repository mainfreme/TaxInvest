services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taxinvest-php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      DATABASE_URL: postgresql://${POSTGRES_USER:-taxinvest}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-taxinvest}?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-taxinvest}:${RABBITMQ_PASSWORD:-secret}@rabbitmq:5672/%2f/messages
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-taxinvest}
      POSTGRES_USER: ${POSTGRES_USER:-taxinvest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-taxinvest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-secret}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - taxinvest

  nginx:
    image: nginx:1.27-alpine
    container_name: taxinvest-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - taxinvest

  postgres:
    image: postgres:16-alpine
    container_name: taxinvest-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taxinvest}
      POSTGRES_USER: ${POSTGRES_USER:-taxinvest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taxinvest} -d ${POSTGRES_DB:-taxinvest}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taxinvest

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: taxinvest-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-taxinvest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taxinvest

  frontend-vue:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
    container_name: taxinvest-frontend-vue
    restart: unless-stopped
    ports:
      - "${VUE_PORT:-5173}:5173"
    volumes:
      - ./frontend-vue:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    networks:
      - taxinvest

  frontend-next:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: taxinvest-frontend-next
    restart: unless-stopped
    ports:
      - "${NEXT_PORT:-3000}:3000"
    volumes:
      - ./frontend-next:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      API_URL_INTERNAL: http://nginx:80
    networks:
      - taxinvest

networks:
  taxinvest:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
